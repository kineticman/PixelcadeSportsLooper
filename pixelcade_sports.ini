# Pixelcade Sports Service Configuration File
# Default location: C:\pixelcade\SportsLooper\pixelcade_sports.ini
# Edit values below to customize service behavior
# The service will create this file automatically with defaults if it doesn't exist

# =============================================================================
# ESSENTIAL SETTINGS - LIKELY NEED TO CHANGE THESE
# =============================================================================

[environment]
# These can also be set as environment variables which will override these values
# Pixelcade API base URL - change if your Pixelcade is on a different port/machine
pixelcade_base_url = http://localhost:8080

[service]
# Message to display when service is starting up - CUSTOMIZE THIS
loading_message = Brad's Bar - now loading

# ZIP code for weather display - CHANGE THIS TO YOUR LOCATION
zip_code = 43017

# How long to display weather (seconds)
weather_display_duration = 20

# How long to display loading/text messages (seconds)
loading_display_duration = 30

[league_toggles]
# Enable or disable leagues (true = enabled, false = disabled)
mlb = true
nba = true
nfl = true
nhl = true
wnba = false
mls = true
epl = false
laliga = false
bundesliga = false
seriea = false
ligue1 = false
ucl = false
ncaaf = true
ncaam = true
ncaaw = false
ncaabb = true

# =============================================================================
# ADVANCED SETTINGS - USUALLY DON'T NEED TO CHANGE THESE
# =============================================================================

[display]
# Minimum display time for any league (seconds)
display_time_min = 15

# Maximum display time for any league (seconds)
display_time_max = 80

# Overall cap on one full rotation of displays (seconds)
max_total_display_time = 120

# Seconds to display per game when calculating display time
seconds_per_game = 6

# How often to refresh the sports schedule data (seconds)
# 600 = 10 minutes
refresh_interval = 600

[timing]
# Default cooldown between API calls (seconds)
cooldown_default = 120

# Timeout when waiting for worker thread to stop (seconds)
worker_thread_timeout = 30.0

# Special cooldown for NCAAM 400 errors (off-season)
cooldown_ncaam_400_error = 120

# Cooldown when no relevant games are found
cooldown_inactive = 120

# Delay at service startup to wait for internet connectivity
startup_delay = 60

# Delay before retrying after errors in main loop
error_retry_delay = 30

[network]
# Timeout for API requests (seconds)
api_timeout = 10

# Number of retry attempts for failed API calls
retry_attempts = 3

# Minimum wait time for exponential backoff retries (seconds)
retry_min_wait = 2

# Maximum wait time for exponential backoff retries (seconds)
retry_max_wait = 10

# Maximum attempts to check internet connectivity on startup
connectivity_max_attempts = 10

# Delay between connectivity check attempts (seconds)
connectivity_retry_delay = 15

# DNS servers to use (comma-separated)
dns_servers = 8.8.8.8,8.8.4.4

# Host to test connectivity against
connectivity_test_host = 8.8.8.8

# Port to test connectivity against
connectivity_test_port = 53

[circuit_breaker]
# Number of failures before opening circuit breaker
failure_threshold = 5

# How long to keep circuit breaker open (seconds)
# 300 = 5 minutes
timeout = 300

[logging]
# Directory for log files - subfolder under SportsLooper
log_directory = C:\pixelcade\SportsLooper\logs

# Log file name
log_filename = scores_service.log

# Maximum log file size in bytes (1048576 = 1MB)
max_log_size = 1048576

# Number of backup log files to keep
backup_count = 2

# =============================================================================
# SPORTS LEAGUE CONFIGURATION - ONLY CHANGE IF ESPN API CHANGES
# =============================================================================

[espn_endpoints]
# ESPN API endpoints for each league
# Format: league_code = api_path
mlb = baseball/mlb
nba = basketball/nba
nfl = football/nfl
nhl = hockey/nhl
wnba = basketball/wnba
mls = soccer/usa.1
epl = soccer/eng.1
laliga = soccer/esp.1
bundesliga = soccer/ger.1
seriea = soccer/ita.1
ligue1 = soccer/fra.1
ucl = soccer/uefa.champions
ncaaf = football/college-football
ncaam = basketball/mens-college-basketball
ncaaw = basketball/womens-college-basketball
ncaabb = baseball/college-baseball

[pixelcade_leagues]
# Mapping from ESPN league codes to Pixelcade league names
# Format: espn_league = pixelcade_league
mlb = mlb
nba = nba
nfl = nfl
nhl = nhl
wnba = wnba
mls = usa.1
epl = eng.1
laliga = esp.1
bundesliga = ger.1
seriea = ita.1
ligue1 = fra.1
ucl = uefa.champions
ncaaf = college-football
ncaam = mens-college-basketball
ncaaw = womens-college-basketball
ncaabb = college-baseball
